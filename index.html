<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1.0, user-scalable=no">
    <title>Sound Pad - MP3 + WAV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        body {
            font-family: "Google Sans", "Product Sans", "Roboto", Arial, sans-serif;
            background: #0a0a1f;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        h1 {
            margin: 20px auto;
            color: #4a4aff;
            font-size: clamp(24px, 7vw, 45px);           /* Responsive size */
            max-width: 460px;
            width: 100%;
        }

        .info {
            font-size: 17px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);   /* Equal width columns */
            gap: 15px;
            max-width: 460px;
            margin: 30px auto;
        }

        .key {
            background: #1e1e3f;
            border: 3px solid #4a4aff;
            border-radius: 15px;
            padding: 20px 12px;
            font-size: 18px;           /* As requested */
            font-weight: 500;          /* As requested */
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 88px;
            text-align: center;
        }

        .key:active, .key.playing {
            background: #4a4aff;
            border-color: #00ffcc;
            transform: scale(0.93);
            box-shadow: 0 0 25px #4a4aff;
        }

        .key.disabled {
            background: #333344;
            border-color: #555566;
            color: #888899;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .stop-btn {
            background: #c42b2b;
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin: 25px auto;
            display: block;
            transition: all 0.2s;
        }

        .stop-btn:hover {
            background: #e63939;
        }

        .status {
            margin: 15px 0;
            font-size: 17px;
            min-height: 28px;
            color: #00ffcc;
        }

        .warning {
            background: #3f2a00;
            color: #ffcc00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 520px;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎵 Sound Pad 🎵</h1>
    <div class="info">
        Press keys <strong>1–9</strong> or tap buttons
    </div>

    <div class="keys" id="keyContainer"></div>

    <button class="stop-btn" id="stopAll">⏹ STOP ALL SOUNDS</button>

    <div class="status" id="status"></div>
    <div class="warning" id="warning"></div>

    <script>
        const sounds = {};
        const buttons = {};
        const displayNames = {};
        let missingFiles = [];

        const statusEl = document.getElementById('status');
        const warningEl = document.getElementById('warning');
        const keyContainer = document.getElementById('keyContainer');

        // Load sounds.csv
        async function loadCSV() {
            try {
                const response = await fetch('sounds.csv');
                if (!response.ok) throw new Error("sounds.csv not found");
                
                const text = await response.text();
                const lines = text.trim().split('\n');

                lines.forEach(line => {
                    if (!line.trim()) return;
                    const [filename, ...nameParts] = line.split(',');
                    const key = filename.trim();
                    const displayName = nameParts.join(',').trim();

                    if (key && displayName && key >= 1 && key <= 9) {
                        displayNames[key] = displayName;
                    }
                });
            } catch (err) {
                console.warn("⚠️ sounds.csv not found — using numbers");
                for (let i = 1; i <= 9; i++) displayNames[i] = i.toString();
            }
        }

        function createButtons() {
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('div');
                btn.className = 'key';
                btn.textContent = displayNames[i] || i;
                btn.dataset.key = i;
                keyContainer.appendChild(btn);
                buttons[i] = btn;

                btn.addEventListener('click', () => {
                    if (!btn.classList.contains('disabled')) playSound(i);
                });
            }
        }

        function loadSound(key) {
            const extensions = ['.ogg', '.wav', '.mp3'];
            let loaded = false;

            extensions.forEach(ext => {
                const audio = new Audio();
                audio.preload = "auto";
                audio.src = `${key}${ext}`;

                audio.addEventListener('canplaythrough', () => {
                    if (!loaded) {
                        loaded = true;
                        sounds[key] = audio;
                    }
                }, { once: true });

                audio.addEventListener('error', () => {});
                audio.load();
            });

            setTimeout(() => {
                if (!sounds[key] && !missingFiles.includes(key)) {
                    missingFiles.push(key);
                    disableButton(key);
                    showWarning();
                }
            }, 1200);
        }

        function loadAllSounds() {
            for (let i = 1; i <= 9; i++) loadSound(i);
        }

        function disableButton(key) {
            if (buttons[key]) buttons[key].classList.add('disabled');
        }

        function showWarning() {
            if (warningEl.style.display === 'block') return;
            warningEl.style.display = 'block';
            warningEl.innerHTML = `⚠️ Some sound files are missing:<br>
                <strong>${missingFiles.map(n => `${n}.*`).join(', ')}</strong>`;

            setTimeout(() => {
                warningEl.style.display = 'none';
            }, 10000);
        }

        function playSound(key) {
            const sound = sounds[key];
            if (!sound) return;

            const btn = buttons[key];
            if (btn) btn.classList.add('playing');

            sound.currentTime = 0;
            const name = displayNames[key] || key;

            sound.play().then(() => {
                statusEl.textContent = `▶ Playing ${name}`;
            }).catch(() => {
                statusEl.textContent = `❌ Cannot play ${name}`;
            });

            sound.onended = () => btn && btn.classList.remove('playing');

            setTimeout(() => btn && btn.classList.remove('playing'), 5000);
        }

        function stopAllSounds() {
            Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
            Object.values(buttons).forEach(btn => btn.classList.remove('playing'));
            statusEl.textContent = '⏹ All sounds stopped';
            setTimeout(() => statusEl.textContent = '', 1500);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') {
                const k = parseInt(e.key);
                if (!buttons[k].classList.contains('disabled')) playSound(k);
            } else if (e.key === '0') {
                stopAllSounds();
            }
        });

        document.getElementById('stopAll').addEventListener('click', stopAllSounds);

        // Initialize
        window.addEventListener('load', async () => {
            await loadCSV();
            createButtons();
            loadAllSounds();
        });
    </script>
</body>
</html>

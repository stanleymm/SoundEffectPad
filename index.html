<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Pad 1-9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a1f;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin: 20px 0; }
        .info {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 30px auto;
        }
        .key {
            background: #1e1e3f;
            border: 3px solid #4a4aff;
            border-radius: 12px;
            padding: 30px 10px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }
        .key:active {
            background: #4a4aff;
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            font-size: 16px;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <h1>🎵 Sound Pad 1-9</h1>
    <div class="info">
        Press keys <strong>1–9</strong> or <strong>Numpad 1–9</strong> to play sounds<br>
        Press <strong>0</strong> or <strong>Numpad 0</strong> to stop all sounds
    </div>

    <div class="keys">
        <div class="key" data-key="1">1</div>
        <div class="key" data-key="2">2</div>
        <div class="key" data-key="3">3</div>
        <div class="key" data-key="4">4</div>
        <div class="key" data-key="5">5</div>
        <div class="key" data-key="6">6</div>
        <div class="key" data-key="7">7</div>
        <div class="key" data-key="8">8</div>
        <div class="key" data-key="9">9</div>
    </div>

    <div class="status" id="status"></div>

    <script>
        // Load all sounds 1.wav to 9.wav
        const sounds = {};
        for (let i = 1; i <= 9; i++) {
            sounds[i] = new Audio(`${i}.wav`);
            sounds[i].preload = "auto";
        }

        const statusEl = document.getElementById('status');

        function playSound(key) {
            if (sounds[key]) {
                sounds[key].currentTime = 0;   // restart from beginning
                sounds[key].play().catch(err => console.log("Play error:", err));
                statusEl.textContent = `▶ Playing ${key}.wav`;
                setTimeout(() => statusEl.textContent = '', 1500);
            }
        }

        function stopAllSounds() {
            Object.values(sounds).forEach(sound => {
                sound.pause();
                sound.currentTime = 0;
            });
            statusEl.textContent = '⏹ Stopped all sounds';
            setTimeout(() => statusEl.textContent = '', 1500);
        }

        // Keyboard support (main + numpad)
        document.addEventListener('keydown', (e) => {
            console.log(`Key pressed: ${e.key} | code: ${e.code}`);

            if (e.key >= '1' && e.key <= '9') {
                playSound(e.key);
            } 
            else if (e.code.startsWith('Numpad') && e.key >= '1' && e.key <= '9') {
                playSound(e.key);
            } 
            else if (e.key === '0' || e.code === 'Numpad0') {
                stopAllSounds();
            }
        });

        // Click on-screen buttons
        document.querySelectorAll('.key').forEach(btn => {
            btn.addEventListener('click', () => {
                playSound(btn.dataset.key);
            });
        });

        // Optional: Show message if some files are missing
        window.addEventListener('load', () => {
            console.log("Sound Pad loaded. Make sure 1.wav to 9.wav are in the same folder.");
        });
    </script>
</body>
</html>

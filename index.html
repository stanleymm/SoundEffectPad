<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Effect Pad</title>
    <style>
        body, html {
            touch-action: pan-x pan-y;   /* Allows scrolling/panning but disables pinch zoom */
            /* Or: touch-action: none;   /* Disables ALL touch gestures including zoom */
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a1f;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin: 20px 0; color: #4a4aff; }
        .info {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 420px;
            margin: 30px auto;
        }
        .key {
            background: #1e1e3f;
            border: 3px solid #4a4aff;
            border-radius: 15px;
            padding: 35px 10px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        .key:active, .key.playing {
            background: #4a4aff;
            border-color: #00ffcc;
            transform: scale(0.92);
            box-shadow: 0 0 20px #4a4aff;
        }
        .key.disabled {
            background: #333344;
            border-color: #555566;
            color: #888899;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .stop-btn {
            background: #c42b2b;
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin: 25px auto;
            display: block;
            transition: all 0.2s;
        }
        .stop-btn:hover {
            background: #e63939;
        }
        .status {
            margin: 15px 0;
            font-size: 17px;
            min-height: 28px;
            color: #00ffcc;
        }
        .warning {
            background: #3f2a00;
            color: #ffcc00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 520px;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎵 Sound Pad 🎵</h1>
    <div class="info">
        Press keys <strong>1–9</strong> to play sound<br>
        Press <strong>0</strong> to stop all
    </div>

    <div class="keys" id="keyContainer"></div>

    <button class="stop-btn" id="stopAll">⏹ STOP ALL SOUNDS</button>

    <div class="status" id="status"></div>
    <div class="warning" id="warning"></div>

    <script>
        const sounds = {};
        const buttons = {};
        let missingFiles = [];

        const statusEl = document.getElementById('status');
        const warningEl = document.getElementById('warning');
        const keyContainer = document.getElementById('keyContainer');

        // Create buttons 1-9
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'key';
            btn.textContent = i;
            btn.dataset.key = i;
            keyContainer.appendChild(btn);
            buttons[i] = btn;

            btn.addEventListener('click', () => {
                if (!btn.classList.contains('disabled')) {
                    playSound(i);
                }
            });
        }

        // Try to load sound with multiple formats
        function loadSound(key) {
            const extensions = ['.ogg', '.wav', '.mp3']; // Best order for Android + desktop
            let loaded = false;

            for (let ext of extensions) {
                const audio = new Audio();
                audio.preload = "auto";
                audio.src = `${key}${ext}`;

                audio.addEventListener('canplaythrough', () => {
                    if (!loaded) {
                        loaded = true;
                        console.log(`✅ Loaded: ${key}${ext}`);
                        sounds[key] = audio;
                    }
                }, { once: true });

                audio.addEventListener('error', () => {
                    // Try next format
                });

                // Force load attempt
                audio.load();
            }

            // If none loaded after a short delay, mark as missing
            setTimeout(() => {
                if (!sounds[key]) {
                    if (!missingFiles.includes(key)) {
                        missingFiles.push(key);
                        disableButton(key);
                        showWarning();
                    }
                }
            }, 1500);
        }

        function loadAllSounds() {
            for (let i = 1; i <= 9; i++) {
                loadSound(i);
            }
        }

        function disableButton(key) {
            const btn = buttons[key];
            if (btn) btn.classList.add('disabled');
        }

        function showWarning() {
            warningEl.style.display = 'block';
            warningEl.innerHTML = `⚠️ Some sound files could not be loaded:<br>
                Track # - <strong>${missingFiles.map(n => n + '.*').join(', ')}</strong><br>`;
                
            // Auto-hide warning after 10 seconds
            setTimeout(() => {
                warningEl.style.display = 'none';
            }, 10000);
        }

        function playSound(key) {
            const sound = sounds[key];
            if (!sound) {
                statusEl.textContent = `❌ No sound loaded for ${key}`;
                return;
            }

            const btn = buttons[key];
            if (btn) btn.classList.add('playing');

            // Restart from beginning (allows overlapping if pressed again)
            sound.currentTime = 0;

            sound.play().then(() => {
                statusEl.textContent = `▶ Playing ${key}`;
            }).catch(err => {
                console.error(`Play error for ${key}:`, err);
                statusEl.textContent = `❌ Cannot play ${key} (autoplay blocked?)`;
            });

            // Remove playing effect when done
            sound.onended = () => {
                if (btn) btn.classList.remove('playing');
            };

            // Fallback timeout
            setTimeout(() => {
                if (btn) btn.classList.remove('playing');
            }, 5000);
        }

        function stopAllSounds() {
            Object.values(sounds).forEach(sound => {
                sound.pause();
                sound.currentTime = 0;
            });

            Object.values(buttons).forEach(btn => {
                btn.classList.remove('playing');
            });

            statusEl.textContent = '⏹ All sounds stopped';
            setTimeout(() => statusEl.textContent = '', 1500);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') {
                const keyNum = parseInt(e.key);
                if (!buttons[keyNum].classList.contains('disabled')) {
                    playSound(keyNum);
                }
            } 
            else if (e.key === '0') {
                stopAllSounds();
            }
        });

        // Stop button
        document.getElementById('stopAll').addEventListener('click', stopAllSounds);

        // Initialize
        window.addEventListener('load', () => {
            loadAllSounds();
            console.log("%cSound Pad ready! Supports .ogg, .wav, .mp3", "color: #4a4aff; font-size: 16px");
        });
    </script>
</body>
</html>
